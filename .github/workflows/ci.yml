name: CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.8.1

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          cache: pnpm
          node-version: 22

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck workspace
        run: pnpm check

      - name: Build workspace
        run: pnpm build

      - name: Smoke adoption flow
        run: pnpm smoke:adoption

      - name: Smoke MCP flow
        run: pnpm smoke:mcp

      - name: Verify golden artifacts
        run: pnpm test:goldens -- --actual-dir .artifacts/golden-review

      - name: Run contract tests
        run: pnpm test:contracts

      - name: Upload golden review artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: golden-review
          path: .artifacts/golden-review

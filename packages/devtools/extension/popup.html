<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIC Devtools</title>
    <style>
      :root {
        color-scheme: dark;
        font-family: "Segoe UI", sans-serif;
      }
      body {
        background: linear-gradient(180deg, #07111a 0%, #0f172a 100%);
        color: #e2e8f0;
        margin: 0;
        min-height: 100vh;
        width: 360px;
      }
      main {
        display: grid;
        gap: 12px;
        padding: 16px;
      }
      .panel {
        background: rgba(15, 23, 42, 0.72);
        border: 1px solid rgba(148, 163, 184, 0.22);
        border-radius: 16px;
        padding: 12px;
      }
      h1 {
        font-size: 16px;
        letter-spacing: 0.06em;
        margin: 0 0 4px;
        text-transform: uppercase;
      }
      p, li, code, button, pre {
        font-size: 12px;
      }
      p {
        color: #94a3b8;
        margin: 0;
      }
      button {
        background: #0f766e;
        border: 0;
        border-radius: 999px;
        color: white;
        cursor: pointer;
        font-weight: 700;
        padding: 8px 12px;
      }
      button[disabled] {
        cursor: not-allowed;
        opacity: 0.45;
      }
      .actions {
        display: flex;
        gap: 8px;
      }
      .status {
        border-radius: 12px;
        padding: 10px 12px;
      }
      .status[data-tone="error"] {
        background: rgba(127, 29, 29, 0.45);
        color: #fecaca;
      }
      .status[data-tone="ok"] {
        background: rgba(6, 78, 59, 0.45);
        color: #bbf7d0;
      }
      .status[data-tone="neutral"] {
        background: rgba(30, 41, 59, 0.7);
        color: #cbd5e1;
      }
      ul {
        display: grid;
        gap: 8px;
        list-style: none;
        margin: 0;
        max-height: 160px;
        overflow: auto;
        padding: 0;
      }
      li {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 10px;
        padding: 10px;
      }
      pre {
        background: rgba(255, 255, 255, 0.04);
        border-radius: 12px;
        margin: 0;
        max-height: 180px;
        overflow: auto;
        padding: 10px;
        white-space: pre-wrap;
        word-break: break-word;
      }
      code {
        color: #7dd3fc;
      }
      .muted {
        color: #94a3b8;
      }
    </style>
  </head>
  <body>
    <main>
      <section class="panel">
        <h1>AIC Devtools</h1>
        <p>Quick status for the active tab. Open the browser DevTools panel for the full inspector.</p>
      </section>

      <section class="panel status" data-tone="neutral" id="status">Waiting for active tab...</section>

      <section class="panel">
        <div class="actions">
          <button id="refresh" type="button">Refresh</button>
          <button id="open-endpoint" type="button" disabled>Open Endpoint</button>
          <button id="copy-json" type="button" disabled>Copy JSON</button>
        </div>
      </section>

      <section class="panel">
        <p id="meta">No manifest loaded yet.</p>
        <p class="muted" id="source">No connection yet.</p>
      </section>

      <section class="panel">
        <ul id="elements">
          <li>No runtime elements discovered yet.</li>
        </ul>
      </section>

      <section class="panel">
        <pre id="json">Awaiting manifest fetch...</pre>
      </section>
    </main>

    <script src="popup.js" type="module"></script>
  </body>
</html>
